<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Assignment Form</title>
</head>
<body>
    <h1>Project Assignment Form</h1>
    <p>Complete your profile to get assigned to internal projects.</p>

    <form action="/submit" method="post">
        <label for="full_name">Full Name</label><br>
        <input type="text" id="full_name" name="full_name"><br><br>

        <label for="email">Email Address</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="experience_level">Experience Level</label><br>
        <select id="experience_level" name="experience_level">
            <option value="">Select your level</option>
            <option value="junior">Junior (0–2 years)</option>
            <option value="mid">Mid-level (2–5 years)</option>
            <option value="senior">Senior (5+ years)</option>
        </select><br><br>

        <label for="primary_stack">Primary Technology Stack</label><br>
        <select id="primary_stack" name="primary_stack">
            <option value="">Choose one</option>
            <option value="backend">Backend Development</option>
            <option value="frontend">Frontend Development</option>
            <option value="fullstack">Full-Stack Development</option>
            <option value="data">Data Engineering</option>
            <option value="devops">DevOps</option>
            <option value="mobile">Mobile Development</option>
        </select><br><br>

        <label for="projects">Available Projects</label><br>
        <select id="projects" name="project_ids" multiple size="8">
            {% for project in projects %}
                <option value="{{ project.id }}">{{ project.name }}</option>
            {% endfor %}
        </select><br><br>

        <label>Preferred Project Duration</label><br>
        <input type="radio" id="short" name="preferred_duration" value="short">
        <label for="short">Short-term (1–3 months)</label><br>

        <input type="radio" id="medium" name="preferred_duration" value="medium">
        <label for="medium">Medium-term (3–6 months)</label><br>

        <input type="radio" id="long" name="preferred_duration" value="long">
        <label for="long">Long-term (6+ months)</label><br><br>

        <label for="additional_skills">Additional Skills</label><br>
        <input type="text" id="additional_skills" name="additional_skills"><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
